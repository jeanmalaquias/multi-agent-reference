replicaCount: 2

image:
  repository: ghcr.io/jeanmalaquias/multi-agent-reference
  tag: latest
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 80
  targetPort: 8080

resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    cpu: 500m
    memory: 512Mi

# Per-agent provider selection (see ADR-003). Surfaced as MAGENT_* env vars.
config:
  plannerProvider: mock
  researcherProvider: mock
  writerProvider: mock
  criticProvider: mock

autoscaling:
  enabled: false
  minReplicas: 2
  maxReplicas: 10
  targetCPUUtilizationPercentage: 70
